locarya {
  database {
    driver = "org.postgresql.Driver"
    url = "jdbc:postgresql://localhost:5432/locarya"
    url = ${?DATABASE_URL}
    user = "locarya"
    user = ${?DATABASE_USER}
    password = "locarya_dev_password"
    password = ${?DATABASE_PASSWORD}

    # Connection pool settings
    pool-size = 10
  }

  http {
    host = "0.0.0.0"
    host = ${?HTTP_HOST}
    port = 8080
    port = ${?HTTP_PORT}
  }

  jwt {
    secret = "locarya-dev-jwt-secret-change-in-production"
    secret = ${?JWT_SECRET}
  }

  r2 {
    endpoint          = "https://example.r2.cloudflarestorage.com"
    endpoint          = ${?R2_ENDPOINT}
    bucket-name       = "locarya"
    bucket-name       = ${?R2_BUCKET_NAME}
    access-key-id     = "dev-placeholder"
    access-key-id     = ${?R2_ACCESS_KEY_ID}
    secret-access-key = "dev-placeholder"
    secret-access-key = ${?R2_SECRET_ACCESS_KEY}
    public-base-url   = "https://cdn.example.com"
    public-base-url   = ${?R2_PUBLIC_BASE_URL}
  }
}
