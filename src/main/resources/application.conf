locarya {
  database {
    driver = "org.postgresql.Driver"
    url = "jdbc:postgresql://localhost:5432/locarya"
    url = ${?DATABASE_URL}
    user = "locarya"
    user = ${?DATABASE_USER}
    password = "locarya_dev_password"
    password = ${?DATABASE_PASSWORD}

    # Connection pool settings
    pool-size = 10
  }

  http {
    host = "0.0.0.0"
    host = ${?HTTP_HOST}
    port = 8080
    port = ${?HTTP_PORT}
  }

  jwt {
    secret = "locarya-dev-jwt-secret-change-in-production"
    secret = ${?JWT_SECRET}
  }
}
