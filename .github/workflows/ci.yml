name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  architecture:
    name: Hexagonal dependency rule (ADR 0005)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check architecture boundaries
        run: ./scripts/check-architecture.sh

  test:
    runs-on: ubuntu-latest
    needs: architecture

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: locarya_test
          POSTGRES_USER: locarya
          POSTGRES_PASSWORD: locarya_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'sbt'

      - name: Setup sbt
        run: |
          echo "deb https://repo.scala-sbt.org/scalasbt/debian all main" | sudo tee /etc/apt/sources.list.d/sbt.list
          echo "deb https://repo.scala-sbt.org/scalasbt/debian /" | sudo tee /etc/apt/sources.list.d/sbt_old.list
          curl -sL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x2EE0EA64E40A89B84B2DF73499E82A75642AC823" | sudo apt-key add
          sudo apt-get update
          sudo apt-get install sbt

      - name: Compile
        run: sbt compile

      - name: Run tests
        run: sbt test
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/locarya_test
          DATABASE_USER: locarya
          DATABASE_PASSWORD: locarya_test_password

      - name: Check formatting
        run: sbt scalafmtCheckAll || true
